apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
 name: auth-hpa
 namespace: default
spec:
 scaleTargetRef:
   apiVersion: apps/v1
   kind: Deployment
   name: auth-deployment
 minReplicas: 1
 maxReplicas: 1 # (no need to scale until really needed - staging)
 metrics:
   - type: Resource
     resource:
       name: cpu
       target:
         type: Utilization
         averageUtilization: 99 # (no need to scale until really needed - staging)
   - type: Resource
     resource:
       name: memory
       target:
         type: Utilization
         averageUtilization: 99 # (no need to scale until really needed - staging)
