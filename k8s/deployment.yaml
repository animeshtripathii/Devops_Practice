apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-deployment
  namespace: default

spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-pod

  template:
    metadata:
      labels:
        app: auth-pod

    spec:
      containers:
        - name: auth-container
          image: 494934332037.dkr.ecr.ap-south-1.amazonaws.com/anujjain-first-ecr-repo:latest
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 3000

          resources:
            requests:
              memory: "64Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "100m"

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5